name: Database Auto Backup Routine

on:
  repository_dispatch:
    types: [database-backup]
  workflow_dispatch: # Memungkinkan menjalankan manual dari UI GitHub
  schedule:
    - cron: '0 0 * * *' # Setiap hari jam 00:00 UTC

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Install PostgreSQL Client 17
        run: |
          sudo apt-get update
          sudo apt-get install -y wget gnupg2
          wget --quiet -O - https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo apt-key add -
          echo "deb http://apt.postgresql.org/pub/repos/apt/ $(lsb_release -cs)-pgdg main" | sudo tee /etc/apt/sources.list.d/pgdg.list
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Initialize Backup Record
        id: init
        run: |
          # Jika dipicu dari aplikasi (repository_dispatch), ambil ID dari payload. 
          # Jika otomatis atau manual dari GitHub, buat ID baru di Supabase.
          
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            echo "BACKUP_ID=${{ github.event.client_payload.backup_id }}" >> $GITHUB_OUTPUT
          else
            # Create a record for scheduled backup
            RESP=$(curl -X POST "${{ secrets.SUPABASE_URL }}/rest/v1/backups" \
              -H "apikey: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Authorization: Bearer ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}" \
              -H "Content-Type: application/json" \
              -H "Prefer: return=representation" \
              -d "{
                \"name\": \"Scheduled_Backup_$(date +'%Y%m%d')\",
                \"status\": \"pending\"
              }")
            
            # Extract ID from response (assuming simple JSON)
            ID=$(echo $RESP | jq -r '.[0].id')
            echo "BACKUP_ID=$ID" >> $GITHUB_OUTPUT
          fi

      - name: Run Backup & Upload to R2
        id: vars
        env:
          SUPABASE_DB_URL: "${{ secrets.SUPABASE_DB_URL }}"
          R2_ACCESS_KEY_ID: "${{ secrets.R2_ACCESS_KEY_ID }}"
          R2_SECRET_ACCESS_KEY: "${{ secrets.R2_SECRET_ACCESS_KEY }}"
          R2_ACCOUNT_ID: "${{ secrets.R2_ACCOUNT_ID }}"
          R2_BUCKET_NAME: "${{ secrets.R2_BUCKET_NAME }}"
          BACKUP_ID: "${{ steps.init.outputs.BACKUP_ID }}"
        run: |
          set -o pipefail
          # Memastikan menggunakan pg_dump versi 17 yang baru diinstal
          export PATH="/usr/lib/postgresql/17/bin:$PATH"
          
          FILENAME="backup_${BACKUP_ID}_$(date +'%Y%m%d_%H%M%S').sql.gz"
          
          # 1. Dump & Compress (Will fail if pg_dump fails)
          echo "--> Starting database dump using $(pg_dump --version)..."
          pg_dump "$SUPABASE_DB_URL" | gzip > $FILENAME
          
          # 2. Upload to R2
          echo "--> Uploading to R2..."
          export AWS_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID
          export AWS_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY
          export AWS_DEFAULT_REGION=auto
          
          aws s3 cp $FILENAME s3://$R2_BUCKET_NAME/erd-builder-pro/backups/$FILENAME --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com
          
          echo "FILENAME=$FILENAME" >> $GITHUB_OUTPUT

      - name: Finalize Status in Supabase
        env:
          SUPABASE_URL: "${{ secrets.SUPABASE_URL }}"
          SUPABASE_SERVICE_ROLE_KEY: "${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}"
          BACKUP_ID: "${{ steps.init.outputs.BACKUP_ID }}"
          FILENAME: "${{ steps.vars.outputs.FILENAME }}"
        run: |
          FILE_PATH="erd-builder-pro/backups/${{ steps.vars.outputs.FILENAME }}"
          
          curl -X PATCH "$SUPABASE_URL/rest/v1/backups?id=eq.$BACKUP_ID" \
            -H "apikey: $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_ROLE_KEY" \
            -H "Content-Type: application/json" \
            -d "{
              \"status\": \"completed\",
              \"file_path\": \"$FILE_PATH\",
              \"file_size\": $(stat -c%s ${{ steps.vars.outputs.FILENAME }})
            }"
