name: Deploy Full-Stack to aaPanel

on:
  push:
    branches: [ optimize-code ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Executing remote ssh commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /www/wwwroot/erd-builder-pro
          
          # 1. Pastikan menarik branch yang benar
          git pull origin optimize-code
          
          # 2. Perbaiki typo npn menjadi npm
          npm install
          
          # 3. Tambahkan limitasi memori agar VPS RAM kecil tidak crash saat build
          export NODE_OPTIONS="--max-old-space-size=1024"
          npm run build
          
          # 4. Gunakan npx untuk memanggil PM2 agar pasti terbaca jalurnya
          npx pm2 restart erd-builder-pro || npx pm2 restart all