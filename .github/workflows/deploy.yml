name: Deploy Full-Stack to aaPanel

on:
  push:
    branches: [ optimize-code ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Executing remote ssh commands
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USERNAME }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          cd /www/wwwroot/erd-builder-pro
          git pull origin optimize-code
          npm install
          npm run build
          # Baris di bawah ini menyuruh aaPanel (PM2) untuk restart server Express agar membaca kode baru
          pm2 restart erd-builder-pro || npx pm2 restart all